<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Для тебя ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose: #e8617a;
      --rose-light: #f4a0af;
      --rose-pale: #fce8ec;
      --cream: #fff8f5;
      --text-dark: #3a1a22;
      --text-mid: #8b4a58;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      position: relative;
    }

    /* Floating petals background */
    .petal {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      opacity: 0;
      animation: floatPetal linear infinite;
      z-index: 0;
    }

    @keyframes floatPetal {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Mesh gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #ffd6de88 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 80%, #ffb3c688 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 60% 40%, #fff0f388 0%, transparent 50%),
        linear-gradient(160deg, #fff5f7 0%, #fce8ec 50%, #ffd6e0 100%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(90vw, 380px);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow:
        0 8px 32px rgba(200, 80, 100, 0.12),
        0 2px 8px rgba(200, 80, 100, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 44px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .heart-icon {
      font-size: 52px;
      animation: heartbeat 2.2s ease-in-out infinite;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 12px rgba(232, 97, 122, 0.45));
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.18); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.12); }
      56%       { transform: scale(1); }
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-dark);
      text-align: center;
      line-height: 1.45;
      margin: 0 0 8px;
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--text-mid);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .question {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 400;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      width: 100%;
      justify-content: center;
      position: relative;
      min-height: 60px;
    }

    button {
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 600;
      padding: 16px 32px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 0.02em;
    }

    button:active {
      transform: scale(0.95) !important;
    }

    #yesBtn {
      background: linear-gradient(135deg, #e8617a, #d94f6a);
      color: white;
      box-shadow: 0 6px 24px rgba(232, 97, 122, 0.42), 0 2px 6px rgba(232, 97, 122, 0.3);
      flex: 1;
      max-width: 160px;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 6px 24px rgba(232, 97, 122, 0.42), 0 2px 6px rgba(232, 97, 122, 0.3); }
      50%       { box-shadow: 0 8px 32px rgba(232, 97, 122, 0.65), 0 2px 8px rgba(232, 97, 122, 0.4); }
    }

    #yesBtn:hover { transform: translateY(-2px); }

    #noBtn {
      background: rgba(255,255,255,0.85);
      color: var(--rose);
      border: 1.5px solid rgba(232, 97, 122, 0.3);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      flex: 1;
      max-width: 160px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease, box-shadow 0.15s ease;
    }

    #noBtn.flying {
      position: fixed;
      z-index: 9999;
    }

    #noBtn.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Success message */
    #message {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    #message.visible {
      display: flex;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-emoji {
      font-size: 48px;
      animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes bounceIn {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    .message-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 7vw, 30px);
      font-weight: 400;
      font-style: italic;
      color: var(--text-dark);
      text-align: center;
      line-height: 1.4;
    }

    .message-sub {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-mid);
      text-align: center;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose-light), transparent);
      margin: 4px 0 24px;
    }

    /* Hide/show question block */
    .question-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .question-block.hidden {
      display: none;
    }

    /* Memories button */
    #memoriesBtn {
      margin-top: 20px;
      background: transparent;
      color: var(--rose);
      border: 1.5px solid rgba(232, 97, 122, 0.4);
      font-size: 15px;
      padding: 13px 24px;
      border-radius: 50px;
      font-weight: 600;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 16px rgba(232, 97, 122, 0.1);
      animation: fadeInUp 0.5s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      display: none;
    }
    #memoriesBtn.visible { display: block; }
    #memoriesBtn:hover { background: rgba(232,97,122,0.06); }

    /* Fullscreen gallery overlay */
    #gallery {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(20, 5, 10, 0.97);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: galleryIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    #gallery.open { display: flex; }

    @keyframes galleryIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .gallery-close {
      position: absolute;
      top: max(20px, env(safe-area-inset-top, 20px));
      right: 20px;
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      font-size: 22px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .gallery-counter {
      position: absolute;
      top: max(26px, calc(env(safe-area-inset-top, 20px) + 8px));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.1em;
    }

    .gallery-track-wrap {
      width: 100%;
      overflow: hidden;
      touch-action: pan-y;
    }

    .gallery-track {
      display: flex;
      transition: transform 0.38s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform;
    }

    .gallery-slide {
      flex: 0 0 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      gap: 20px;
    }

    .gallery-photo {
      width: min(88vw, 420px);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 72px;
    }

    .gallery-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
    }

    .gallery-caption {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.9);
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
    }

    .gallery-dots {
      position: absolute;
      bottom: max(32px, env(safe-area-inset-bottom, 32px));
      display: flex;
      gap: 8px;
    }

    .gallery-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }
    .gallery-dot.active {
      width: 20px;
      border-radius: 3px;
      background: var(--rose);
    }

    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
      z-index: 10;
    }
    .gallery-arrow:hover { background: rgba(255,255,255,0.2); }
    .gallery-arrow.prev { left: 12px; }
    .gallery-arrow.next { right: 12px; }
    .gallery-arrow.hidden-arrow { opacity: 0; pointer-events: none; }

    /* Upload placeholder hint */
    .photo-placeholder {
      width: min(88vw, 420px);
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      border: 2px dashed rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
    .photo-placeholder .ph-icon { font-size: 48px; opacity: 0.5; }

  </style>
</head>

<body>

  <!-- Floating hearts/petals -->
  <div class="petal" style="left:8%;  animation-duration:9s;  animation-delay:0s;">🌸</div>
  <div class="petal" style="left:22%; animation-duration:11s; animation-delay:2s;">💕</div>
  <div class="petal" style="left:40%; animation-duration:8s;  animation-delay:4s;">🌸</div>
  <div class="petal" style="left:60%; animation-duration:13s; animation-delay:1s;">🌷</div>
  <div class="petal" style="left:75%; animation-duration:10s; animation-delay:3s;">💕</div>
  <div class="petal" style="left:88%; animation-duration:7s;  animation-delay:5s;">🌸</div>
  <div class="petal" style="left:50%; animation-duration:12s; animation-delay:6s;">🌷</div>
  <div class="petal" style="left:15%; animation-duration:9s;  animation-delay:7s;">💗</div>

  <div class="card">

    <div class="heart-icon">❤️</div>

    <h1>Любовь моя, поздравляю с нашей небольшой годовщиной</h1>
    <div class="divider"></div>

    <!-- Question block -->
    <div class="question-block" id="questionBlock">
      <p class="question">Любишь ли ты меня?</p>
      <div class="buttons">
        <button id="yesBtn">Да 💖</button>
        <button id="noBtn">Нет 😢</button>
      </div>
    </div>

    <!-- Success message -->
    <div id="message">
      <div class="message-emoji">🥰</div>
      <div class="message-text">Я тебя тоже люблю!</div>
      <div class="message-sub">Больше, чем все звёзды на небе ✨</div>
    </div>

  </div>

<script>
  const noBtn  = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const message = document.getElementById("message");
  const questionBlock = document.getElementById("questionBlock");

  let moveCount = 0;
  const MAX_MOVES = 5;

  function getRandomPos() {
    const margin = 16;
    const btnW = noBtn.offsetWidth  || 130;
    const btnH = noBtn.offsetHeight || 56;
    const maxX = window.innerWidth  - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;
    const x = margin + Math.random() * (maxX - margin);
    const y = margin + Math.random() * (maxY - margin);
    return {
      x: Math.max(margin, Math.min(x, maxX)),
      y: Math.max(margin, Math.min(y, maxY))
    };
  }

  let isAnimating = false;

  noBtn.addEventListener("click", () => {
    if (isAnimating) return;

    moveCount++;

    if (moveCount >= MAX_MOVES) {
      noBtn.classList.add("hidden");
      return;
    }

    // First click: detach to fixed positioning without transition
    if (!noBtn.classList.contains("flying")) {
      const rect = noBtn.getBoundingClientRect();
      noBtn.style.transition = "none";
      noBtn.classList.add("flying");
      noBtn.style.left  = rect.left + "px";
      noBtn.style.top   = rect.top  + "px";
      noBtn.style.width = rect.width + "px";
    }

    const pos = getRandomPos();
    isAnimating = true;

    // Force reflow so transition fires correctly
    noBtn.getBoundingClientRect();
    noBtn.style.transition = "left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)";
    noBtn.style.left = pos.x + "px";
    noBtn.style.top  = pos.y + "px";

    setTimeout(() => { isAnimating = false; }, 450);
  });

  yesBtn.addEventListener("click", () => {
    noBtn.classList.add("hidden");
    questionBlock.classList.add("hidden");
    message.classList.add("visible");

    memoriesBtn.classList.add('visible');
    // Launch celebratory burst
    launchHearts();
  });

  function launchHearts() {
    const emojis = ["❤️","💕","🌸","✨","💗","💖"];
    for (let i = 0; i < 18; i++) {
      setTimeout(() => {
        const el = document.createElement("div");
        el.style.cssText = `
          position: fixed;
          left: ${30 + Math.random() * 40}vw;
          top: 60vh;
          font-size: ${16 + Math.random() * 18}px;
          pointer-events: none;
          z-index: 9999;
          animation: burst 1.2s ease-out forwards;
          --dx: ${(Math.random() - 0.5) * 200}px;
          --dy: ${-(60 + Math.random() * 140)}px;
        `;
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1400);
      }, i * 60);
    }
  }


  // ── Memories button & gallery ──────────────────────────────────────────

    { src: null, caption: 'Самый счастливый момент ✨' },

    { src: null, caption: 'Люблю тебя каждый день ❤️' },

  const memoriesBtn  = document.getElementById("memoriesBtn");
  const gallery      = document.getElementById("gallery");
  const galleryClose = document.getElementById("galleryClose");
  const galleryTrack = document.getElementById("galleryTrack");
  const galleryDots  = document.getElementById("galleryDots");
  const galleryCounter = document.getElementById("galleryCounter");
  const prevBtn      = document.getElementById("prevBtn");
  const nextBtn      = document.getElementById("nextBtn");

  let currentSlide = 0;

  // Build slides
  photos.forEach((photo, i) => {
    const slide = document.createElement("div");
    slide.className = "gallery-slide";

    const photoBox = document.createElement("div");
    photoBox.className = "gallery-photo";

    if (photo.src) {
      const img = document.createElement("img");
      img.src = photo.src;
      img.alt = photo.caption;
      photoBox.appendChild(img);
    } else {
      photoBox.innerHTML = `
        <div class="photo-placeholder">
          <div class="ph-icon">🖼️</div>
          <div>Добавь своё фото:<br>замени <code>src: null</code><br>на ссылку на фото</div>
        </div>`;
    }

    const caption = document.createElement("div");
    caption.className = "gallery-caption";
    caption.textContent = photo.caption;

    slide.appendChild(photoBox);
    slide.appendChild(caption);
    galleryTrack.appendChild(slide);

    // dot
    const dot = document.createElement("div");
    dot.className = "gallery-dot" + (i === 0 ? " active" : "");
    galleryDots.appendChild(dot);
  });

  function goTo(idx) {
    currentSlide = Math.max(0, Math.min(idx, photos.length - 1));
    galleryTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
    document.querySelectorAll(".gallery-dot").forEach((d, i) =>
      d.classList.toggle("active", i === currentSlide));
    galleryCounter.textContent = `${currentSlide + 1} / ${photos.length}`;
    prevBtn.classList.toggle("hidden-arrow", currentSlide === 0);
    nextBtn.classList.toggle("hidden-arrow", currentSlide === photos.length - 1);
  }

  goTo(0);

  memoriesBtn.addEventListener("click", () => {
    gallery.classList.add("open");
    goTo(0);
  });

  galleryClose.addEventListener("click", () => gallery.classList.remove("open"));
  prevBtn.addEventListener("click", () => goTo(currentSlide - 1));
  nextBtn.addEventListener("click", () => goTo(currentSlide + 1));

  // Swipe support
  let touchStartX = 0, touchStartY = 0, isDragging = false;

  gallery.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  gallery.addEventListener("touchmove", e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isDragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      isDragging = true;
    }
  }, { passive: true });

  gallery.addEventListener("touchend", e => {
    if (!isDragging) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      dx < 0 ? goTo(currentSlide + 1) : goTo(currentSlide - 1);
    }
  });

  // Close on backdrop (outside track)
  gallery.addEventListener("click", e => {
    if (e.target === gallery) gallery.classList.remove("open");
  });

  // Inject burst keyframes dynamically
  const style = document.createElement("style");
  style.textContent = `
    @keyframes burst {
      0%   { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.4); }
    }
  `;
  document.head.appendChild(style);
</script>


  <!-- Gallery overlay -->
  <div id="gallery">
    <button class="gallery-close" id="galleryClose">✕</button>
    <div class="gallery-counter" id="galleryCounter">1 / 5</div>

    <button class="gallery-arrow prev" id="prevBtn">‹</button>
    <button class="gallery-arrow next" id="nextBtn">›</button>

    <div class="gallery-track-wrap" id="trackWrap">
      <div class="gallery-track" id="galleryTrack"></div>
    </div>

    <div class="gallery-dots" id="galleryDots"></div>
  </div>
