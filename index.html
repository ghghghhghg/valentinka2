<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Для тебя ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    h1 {
      color: white;
      font-size: 42px;
      text-align: center;
    }

    .buttons {
      margin-top: 30px;
      position: relative;
      width: 300px;
      height: 200px;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
      position: absolute;
      left: 30px;
      top: 70px;
    }

    #noBtn {
      background: white;
      color: #ff4d6d;
      position: absolute;
      right: 30px;
      top: 70px;
    }

    #message {
      margin-top: 30px;
      font-size: 32px;
      color: white;
      display: none;
    }
  </style>
</head>

<body>

  <h1>Будешь моей Валентинкой? ❤️</h1>

  <div class="buttons">
    <button id="yesBtn">Да 💖</button>
    <button id="noBtn">Нет 😢</button>
  </div>

  <div id="message">
    Урааа ❤️🥰
  </div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const message = document.getElementById("message");

  let moveCount = 0;

  // позиции по углам + центр
  const positions = [
    { x: 20, y: 20 }, // левый верхний
    { x: window.innerWidth - 140, y: 20 }, // правый верхний
    { x: 20, y: window.innerHeight - 80 }, // левый нижний
    { x: window.innerWidth - 140, y: window.innerHeight - 80 }, // правый нижний
    { x: window.innerWidth / 2 - 60, y: window.innerHeight / 2 } // центр
  ];

  noBtn.addEventListener("click", () => {

    if (moveCount < positions.length) {

      noBtn.style.position = "absolute";
      noBtn.style.left = positions[moveCount].x + "px";
      noBtn.style.top = positions[moveCount].y + "px";

      moveCount++;

    } else {

      // после всех прыжков скрываем кнопку
      noBtn.style.display = "none";

    }
  });

  yesBtn.addEventListener("click", () => {
    message.style.display = "block";
  });
</script></body>
</html>
